<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鼓勵存摺</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: sans-serif; }
    .bg-dot-pattern { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.2s ease-out; }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    /* Hide scrollbar for IE, Edge and Firefox */
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 主要應用程式邏輯 (設定為 module 以支援 import) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    
    // 引入 Lucide 圖示
    import * as LucideIcons from 'https://esm.sh/lucide-react@0.294.0';
    const { 
      Users, UserPlus, BookOpen, Clock, Briefcase, FileText, Smile, Star, Coins,
      School, Database, ArrowLeft, Trash2, MoreVertical, LayoutGrid, Download,
      MinusCircle, PlusCircle, CheckCircle2, ExternalLink, Gift, ShoppingBag, Plus,
      Send, AlertTriangle, X, Settings, Edit2, ChevronUp, ChevronDown, PenLine,
      Tags, Filter, ChevronLeft, ChevronRight, FolderEdit, Search, ListPlus, Store
    } = LucideIcons;

    // 引入 Firebase SDK
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, writeBatch
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- Firebase 初始化 ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyBXo1w7t0m628itmIc80yxbdWCXeQFSqzw",
      authDomain: "encourage-aac2a.firebaseapp.com",
      projectId: "encourage-aac2a",
      storageBucket: "encourage-aac2a.firebasestorage.app",
      messagingSenderId: "199149170670",
      appId: "1:199149170670:web:4819074ddd69597641a8ff"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'encourage-aac2a'; 

    // --- 輔助函式：判斷學生是否在班級內及獲取專屬座號 ---
    const isStudentInClass = (s, cId) => s.classId === cId || (s.classInfo && s.classInfo[cId] !== undefined);
    const getStudentSeat = (s, cId) => s.classInfo?.[cId]?.seatNumber ?? (s.classId === cId ? s.seatNumber : '');
    const getStudentOrder = (s, cId) => s.classInfo?.[cId]?.order ?? (s.classId === cId ? s.order : 0);

    // --- 組件：擬真硬幣 ---
    const Coin = ({ value, onClick, label, isDeduct }) => {
      let bgColor = isDeduct ? "bg-red-500" : "bg-yellow-400";
      let borderColor = isDeduct ? "border-red-700" : "border-yellow-600";
      let textColor = isDeduct ? "text-white" : "text-yellow-900";
      let size = "w-12 h-12 md:w-14 md:h-14"; 

      const displayValue = isDeduct ? `-${value}` : `${value}`;

      if (value === 50) {
        bgColor = isDeduct ? "bg-red-600" : "bg-yellow-500";
        size = "w-14 h-14 md:w-16 md:h-16";
      } else if (value === 10) {
        bgColor = isDeduct ? "bg-red-400" : "bg-gray-300";
        borderColor = isDeduct ? "border-red-600" : "border-gray-500";
        textColor = isDeduct ? "text-white" : "text-gray-800";
        size = "w-12 h-12 md:w-14 md:h-14";
      } else if (value === 5) {
        bgColor = isDeduct ? "bg-red-300" : "bg-gray-200";
        borderColor = isDeduct ? "border-red-500" : "border-gray-400";
        textColor = isDeduct ? "text-white" : "text-gray-700";
      } else {
        bgColor = isDeduct ? "bg-red-200" : "bg-orange-200";
        borderColor = isDeduct ? "border-red-400" : "border-orange-600";
        textColor = isDeduct ? "text-red-900" : "text-orange-900";
        size = "w-10 h-10 md:w-12 md:h-12";
      }

      return (
        <button 
          onClick={onClick}
          className={`${size} ${bgColor} ${borderColor} border-4 rounded-full flex items-center justify-center shadow-lg transform active:scale-95 transition-all hover:-translate-y-1 mx-1 md:mx-2 relative group flex-shrink-0`}
        >
          <div className="absolute inset-1 border border-dashed border-opacity-50 border-white rounded-full"></div>
          <span className={`font-bold text-lg ${textColor} drop-shadow-sm`}>${displayValue}</span>
          <span className="absolute -bottom-8 opacity-0 group-hover:opacity-100 transition-opacity bg-gray-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap z-50 pointer-events-none">
            {label || (isDeduct ? `扣 ${value} 元` : `加 ${value} 元`)}
          </span>
        </button>
      );
    };

    // --- 組件：任務卡片 ---
    const TaskCard = ({ icon: Icon, title, points, color, onClick, isVariable, isDeduct }) => {
      const displayPoints = isDeduct 
        ? (typeof points === 'string' ? `-${points}` : `-${points}`) 
        : `+${points}`;
        
      const finalColor = isDeduct ? 'border-red-300 bg-red-50 hover:bg-red-100' : `${color} bg-white hover:bg-opacity-50`;
      const iconColor = isDeduct ? 'text-red-500' : color.replace('border-', 'text-').replace('200', '600');
      const iconBg = isDeduct ? 'bg-red-100' : color.replace('border-', 'bg-').replace('200', '100');
      const badgeColor = isDeduct ? 'bg-red-600 text-white border-red-700' : 'bg-red-100 text-red-600 border-red-200';

      return (
        <button 
          onClick={onClick}
          className={`relative flex flex-col items-center p-2 rounded-xl border-2 ${finalColor} shadow-sm hover:shadow-md transition-all active:scale-95 w-full min-h-[90px] justify-center`}
        >
          <div className={`p-2 rounded-full mb-1 ${iconBg}`}>
            <Icon size={18} className={iconColor} />
          </div>
          <span className="font-bold text-gray-700 text-xs mb-1 text-center leading-tight">{title}</span>
          <div className={`${badgeColor} text-[10px] font-bold px-2 py-0.5 rounded-full border`}>
            {displayPoints}
          </div>
          {isVariable && (
            <span className="absolute top-2 right-2 flex h-2 w-2">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
            </span>
          )}
        </button>
      );
    };

    // --- 組件：商品卡片 ---
    const RewardCard = ({ item, onClick, onDelete, onEdit, onMoveUp, onMoveDown, isManagementMode, isFirst, isLast }) => {
      if (!item) return null;
      return (
        <div 
          onClick={onClick}
          className={`relative flex flex-col items-center p-3 rounded-xl border-2 bg-white shadow-sm hover:shadow-md transition-all active:scale-95 w-full min-h-[140px] justify-center group cursor-pointer
            ${isManagementMode ? 'border-gray-200' : 'border-purple-200 hover:bg-purple-50'}
          `}
        >
          <div className="p-3 rounded-full mb-2 bg-purple-100 text-purple-600 relative">
            <Gift size={24} />
          </div>
          
          {item.categoryName && (
            <div className="absolute top-2 left-2 text-[10px] bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded border border-purple-100 max-w-[60px] truncate">
              {item.categoryName}
            </div>
          )}

          <span className="font-bold text-gray-700 text-sm mb-1 text-center leading-tight line-clamp-2 px-2 w-full">{item.name || '未命名'}</span>
          <div className="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full border border-gray-300 mt-auto">
            ${item.cost || 0}
          </div>
          
          {isManagementMode && (
            <>
              <div className="absolute top-2 right-2 flex flex-col gap-1 z-10">
                <button 
                  onClick={(e) => { e.stopPropagation(); onEdit(item); }}
                  className="p-1 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-colors bg-white/80 backdrop-blur-sm"
                  title="編輯"
                >
                  <Edit2 size={14} />
                </button>
                <button 
                  onClick={(e) => { e.stopPropagation(); onDelete(item); }}
                  className="p-1 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors bg-white/80 backdrop-blur-sm"
                  title="刪除"
                >
                  <Trash2 size={14} />
                </button>
              </div>

              <div className="absolute bottom-2 right-2 flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity z-10 bg-white/80 rounded backdrop-blur-sm">
                 <button 
                  onClick={(e) => { e.stopPropagation(); onMoveUp(item); }}
                  disabled={isFirst}
                  className="p-1 text-gray-500 hover:text-purple-600 hover:bg-purple-100 rounded disabled:opacity-20 disabled:hover:bg-transparent disabled:hover:text-gray-500"
                  title="向前移動"
                 >
                   <ChevronLeft size={16} />
                 </button>
                 <button 
                  onClick={(e) => { e.stopPropagation(); onMoveDown(item); }}
                  disabled={isLast}
                  className="p-1 text-gray-500 hover:text-purple-600 hover:bg-purple-100 rounded disabled:opacity-20 disabled:hover:bg-transparent disabled:hover:text-gray-500"
                  title="向後移動"
                 >
                   <ChevronRight size={16} />
                 </button>
              </div>
            </>
          )}
        </div>
      );
    };

    // --- 組件：通用編輯列 ---
    const EditRow = ({ item, index, total, onMove, onUpdateName, onDeleteRequest, placeholder }) => {
      const [localName, setLocalName] = useState(item?.name || '');

      useEffect(() => {
        setLocalName(item?.name || '');
      }, [item?.name]);

      const handleBlur = () => {
        if (!item || !item.id) return;
        const cleanName = localName.trim();
        if (cleanName !== (item.name || '') && cleanName !== '') {
          onUpdateName(item.id, cleanName);
        } else {
          setLocalName(item.name || ''); 
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.target.blur(); 
        }
      };

      if (!item) return null;

      return (
        <div className="flex items-center gap-2 p-2 bg-white border rounded-lg shadow-sm hover:border-amber-300 transition-colors">
          <div className="flex flex-col gap-1">
            <button 
              onClick={() => onMove(index, -1)}
              disabled={index === 0}
              className="p-1 text-gray-400 hover:text-amber-600 disabled:opacity-30 hover:bg-gray-100 rounded"
            >
              <ChevronUp size={16} />
            </button>
            <button 
              onClick={() => onMove(index, 1)}
              disabled={index >= total - 1}
              className="p-1 text-gray-400 hover:text-amber-600 disabled:opacity-30 hover:bg-gray-100 rounded"
            >
              <ChevronDown size={16} />
            </button>
          </div>

          <input 
            className="flex-1 p-2 border border-gray-200 rounded focus:border-amber-400 outline-none"
            value={localName}
            onChange={(e) => setLocalName(e.target.value)}
            onBlur={handleBlur}
            onKeyDown={handleKeyDown}
            placeholder={placeholder}
          />

          <button 
            onClick={() => onDeleteRequest(item)}
            className="p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded transition-colors"
            title="刪除"
          >
            <Trash2 size={18} />
          </button>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      
      const [classesData, setClassesData] = useState([]);
      const [studentsData, setStudentsData] = useState([]);
      const [rewardsData, setRewardsData] = useState([]); 
      const [categoriesData, setCategoriesData] = useState([]); 
      const [storesData, setStoresData] = useState([]); // 新增：商店分店資料
      
      // 視圖狀態： class_dashboard, store_management, student_management, student_detail
      const [selectedClassId, setSelectedClassId] = useState('');
      const [viewMode, setViewMode] = useState('class_dashboard'); 
      const [selectedStudentId, setSelectedStudentId] = useState('');
      const [previousViewMode, setPreviousViewMode] = useState('class_dashboard');

      const [searchQuery, setSearchQuery] = useState('');

      const [isDeductMode, setIsDeductMode] = useState(false); 
      const [multiSelectedIds, setMultiSelectedIds] = useState([]); 
      const [actionTab, setActionTab] = useState('earn'); 
      const [customPoints, setCustomPoints] = useState('');
      const [customReason, setCustomReason] = useState(''); 

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [currentTask, setCurrentTask] = useState(null);
      const [modalReason, setModalReason] = useState(''); 
      const [toast, setToast] = useState(null); 
      const [redeemConfirmTarget, setRedeemConfirmTarget] = useState(null); 
      
      const [isAddStudentOpen, setIsAddStudentOpen] = useState(false);
      const [newStudentName, setNewStudentName] = useState('');
      const [newStudentSeat, setNewStudentSeat] = useState(''); 
      
      // 學生總表加入 Modal
      const [isSelectExistingOpen, setIsSelectExistingOpen] = useState(false);
      const [existingSearch, setExistingSearch] = useState('');
      const [isAddGlobalStudentOpen, setIsAddGlobalStudentOpen] = useState(false);
      const [globalStudentName, setGlobalStudentName] = useState('');
      const [globalStudentSeat, setGlobalStudentSeat] = useState(''); // 全域座號

      const [isBatchImportOpen, setIsBatchImportOpen] = useState(false);
      const [batchInput, setBatchInput] = useState('');

      const [isAddClassOpen, setIsAddClassOpen] = useState(false);
      const [newClassName, setNewClassName] = useState('');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      
      const [isAddRewardOpen, setIsAddRewardOpen] = useState(false);
      const [newRewardName, setNewRewardName] = useState('');
      const [newRewardCost, setNewRewardCost] = useState('');
      const [newRewardCategoryId, setNewRewardCategoryId] = useState(''); 
      const [editingReward, setEditingReward] = useState(null);
      
      const [selectedCategoryId, setSelectedCategoryId] = useState('all'); 
      const [isManageCategoriesOpen, setIsManageCategoriesOpen] = useState(false); 
      const [newCategoryName, setNewCategoryName] = useState('');
      const [isAddCategoryOpen, setIsAddCategoryOpen] = useState(false);

      const [isManageClassesOpen, setIsManageClassesOpen] = useState(false); 
      const [renameTarget, setRenameTarget] = useState(null); 

      // 商店管理狀態
      const [selectedStoreId, setSelectedStoreId] = useState('');
      const [isManageStoresOpen, setIsManageStoresOpen] = useState(false);
      const [isAddStoreOpen, setIsAddStoreOpen] = useState(false);
      const [newStoreName, setNewStoreName] = useState('');

      const [editingHistoryItem, setEditingHistoryItem] = useState(null); 
      const [editHistoryForm, setEditHistoryForm] = useState({ reason: '', amount: 0, date: '' });

      const [deleteTarget, setDeleteTarget] = useState(null); 

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Init Error:", err);
            if (err.code === 'auth/operation-not-allowed') {
               console.warn("請至 Firebase 控制台的 Authentication 開啟「匿名 (Anonymous)」登入！");
            }
          }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, setUser);
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        
        const unsubClasses = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'classes')), (snapshot) => {
          const loadedClasses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          loadedClasses.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
          setClassesData(loadedClasses);
          if (!selectedClassId && loadedClasses.length > 0 && viewMode === 'class_dashboard') {
            setSelectedClassId(loadedClasses[0].id);
          }
        }, (err) => console.error(err));

        const unsubStudents = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'students')), (snapshot) => {
          const loadedStudents = snapshot.docs.map(d => ({ 
            id: d.id, 
            ...d.data() 
          }));
          setStudentsData(loadedStudents);
        }, (err) => console.error(err));

        const unsubCategories = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'categories')), (snapshot) => {
          const loadedCategories = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          loadedCategories.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
          setCategoriesData(loadedCategories);
        }, (err) => console.error(err));

        const unsubRewards = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'rewards')), (snapshot) => {
          const loadedRewards = snapshot.docs.map(d => ({ 
            id: d.id, 
            order: d.data().order || 0, 
            ...d.data() 
          }));
          setRewardsData(loadedRewards);
        }, (err) => console.error(err));

        const unsubStores = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'stores')), (snapshot) => {
          const loadedStores = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          loadedStores.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
          setStoresData(loadedStores);
        }, (err) => console.error(err));

        return () => { unsubClasses(); unsubStudents(); unsubCategories(); unsubRewards(); unsubStores(); };
      }, [user, selectedClassId, viewMode]);

      const safeClasses = (classesData || []).filter(c => c && c.id);
      const safeStudents = (studentsData || []).filter(s => s && s.id);
      
      // 商店安全過濾與預設值
      let safeStores = (storesData || []).filter(s => s && s.id);
      if (safeStores.length === 0) {
          safeStores = [{ id: 'default', name: '預設商店', order: 0 }];
      }
      const activeStoreId = selectedStoreId && safeStores.find(s => s.id === selectedStoreId) ? selectedStoreId : safeStores[0].id;

      const safeCategories = (categoriesData || []).filter(c => c && c.id);
      const safeRewards = (rewardsData || []).filter(r => r && r.id);

      const storeCategories = safeCategories.filter(c => c.storeId === activeStoreId || (!c.storeId && activeStoreId === safeStores[0].id));
      const storeRewards = safeRewards.filter(r => r.storeId === activeStoreId || (!r.storeId && activeStoreId === safeStores[0].id));

      const enhancedRewards = storeRewards.map(r => {
        const cat = storeCategories.find(c => c.id === r.categoryId);
        return { ...r, categoryName: cat ? cat.name : null };
      }).sort((a, b) => {
        const catIdA = String(a.categoryId || '');
        const catIdB = String(b.categoryId || '');
        if (catIdA !== catIdB) return catIdA.localeCompare(catIdB);
        if (a.order !== b.order) return (a.order || 0) - (b.order || 0);
        return (a.cost || 0) - (b.cost || 0);
      });

      const displayedRewards = selectedCategoryId === 'all' 
        ? enhancedRewards 
        : enhancedRewards.filter(r => r.categoryId === selectedCategoryId);

      const currentClass = safeClasses.find(c => c.id === selectedClassId);
      
      // 取得屬於目前班級的學生
      const classStudents = safeStudents.filter(s => isStudentInClass(s, selectedClassId));
      const selectedStudent = safeStudents.find(s => s.id === selectedStudentId);

      let filteredStudents = classStudents;
      if (searchQuery.trim()) {
        const q = searchQuery.trim().toLowerCase();
        filteredStudents = classStudents.filter(s => {
          const seatNum = getStudentSeat(s, selectedClassId);
          const matchName = String(s.name || '').toLowerCase().includes(q);
          const matchSeat = String(seatNum || '').toLowerCase().includes(q);
          return matchName || matchSeat;
        });
      }
      
      filteredStudents.sort((a, b) => {
        const orderA = getStudentOrder(a, selectedClassId);
        const orderB = getStudentOrder(b, selectedClassId);
        if (orderA !== orderB) return orderA - orderB;

        const seatA = parseInt(getStudentSeat(a, selectedClassId), 10);
        const seatB = parseInt(getStudentSeat(b, selectedClassId), 10);
        const validA = !isNaN(seatA);
        const validB = !isNaN(seatB);

        if (validA && validB) return seatA - seatB;
        if (validA) return -1;
        if (validB) return 1;
        
        return (a.name || '').localeCompare(b.name || '');
      });

      const handleSwitchClass = (classId) => {
        setSelectedClassId(classId);
        setViewMode('class_dashboard');
        setSelectedStudentId('');
        setMultiSelectedIds([]); 
        setIsDeductMode(false); 
        setActionTab('earn');
        setCustomReason('');
        setCustomPoints('');
        setSearchQuery(''); 
        if (window.innerWidth < 768) setIsSidebarOpen(false);
      };

      const handleGoToStore = () => {
        setViewMode('store_management');
        setSelectedStudentId('');
        setMultiSelectedIds([]);
        setSearchQuery('');
        if (window.innerWidth < 768) setIsSidebarOpen(false);
      };

      const handleGoToStudentManagement = () => {
        setViewMode('student_management');
        setSelectedStudentId('');
        setMultiSelectedIds([]);
        setSearchQuery('');
        if (window.innerWidth < 768) setIsSidebarOpen(false);
      };

      const handleSelectStudentDetail = (studentId, fromMode = 'class_dashboard') => {
        setPreviousViewMode(fromMode);
        setSelectedStudentId(studentId);
        setViewMode('student_detail');
      };

      const handleBackToClass = () => {
        setViewMode(previousViewMode);
        setSelectedStudentId('');
      };

      const exportToCSV = () => {
        if (!classStudents || classStudents.length === 0) return;
        const headers = ["班級", "座號", "姓名", "目前餘額", "最後更新日期", "最後摘要"];
        
        const sortedForExport = [...classStudents].sort((a, b) => {
          const numA = parseInt(getStudentSeat(a, selectedClassId), 10);
          const numB = parseInt(getStudentSeat(b, selectedClassId), 10);
          if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
          if (!isNaN(numA)) return -1;
          if (!isNaN(numB)) return 1;
          return (a.name || '').localeCompare(b.name || '');
        });

        const rows = sortedForExport.map(student => {
          const safeHistory = student.history || [];
          const lastRecord = safeHistory.length > 0 ? safeHistory[0] : {};
          return [
            currentClass?.name || '-',
            getStudentSeat(student, selectedClassId),
            student.name || '未命名',
            student.balance || 0,
            lastRecord.date || '-',
            lastRecord.reason || '-'
          ].map(field => `"${field}"`).join(",");
        });

            const legacySeat = s.classId === cId ? s.seatNumber : '';
            return {
                ...currentInfo,
                [cId]: {
                    ...currentInfo[cId],
                    seatNumber: currentInfo[cId]?.seatNumber ?? legacySeat,
                    order: newOrder
                }
            };
        };

        batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'students', student.id), { 
            classInfo: updateStudentOrderObj(student, selectedClassId, targetOrder) 
        });
        batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'students', targetStudent.id), {

                <div className="p-4 border-t bg-gray-50 rounded-b-2xl text-right shrink-0">
                  <button 
                    onClick={() => setIsManageStoresOpen(false)}
                    className="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition-colors"
                  >
                    完成
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Modal: 班級管理 (排序/改名/刪除) */}
          {isManageClassesOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[55] backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg animate-fadeIn flex flex-col max-h-[85vh]">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                  <h3 className="text-lg font-bold text-gray-800 flex items-center">
                    <Settings className="mr-2" size={20}/> 班級管理
                  </h3>
                  <button onClick={() => setIsManageClassesOpen(false)} className="text-gray-400 hover:text-gray-600">
                    <X size={24} />
                  </button>
                </div>
                
                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                   <p className="text-sm text-gray-500 mb-2">可修改名稱或調整顯示順序</p>
                   {safeClasses.map((cls, index) => (
                     <EditRow 
                       key={cls.id}
                       item={cls}
                       index={index}
                       total={safeClasses.length}
                       onMove={moveClass}
                       onUpdateName={updateClassName}
                       onDeleteRequest={requestDeleteClass}
                       placeholder="輸入班級名稱..."
                     />
                   ))}

                   {safeClasses.length === 0 && (
                     <div className="text-center py-8 text-gray-400 border-2 border-dashed border-gray-200 rounded-lg">目前沒有班級</div>
                   )}
                </div>

                <div className="p-4 border-t bg-gray-50 rounded-b-2xl text-right shrink-0">
                  <button 
                    onClick={() => setIsManageClassesOpen(false)}
                    className="bg-amber-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-amber-600 transition-colors"
                  >
                    完成
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Modal: 兌換確認 */}
          {redeemConfirmTarget && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm animate-fadeIn border-t-8 border-purple-500">
                <div className="flex items-center justify-center mb-4 text-purple-600">
                   <Gift size={48} className="drop-shadow-sm" />
                </div>
                <h3 className="text-xl font-bold text-center mb-2 text-gray-800">確認兌換</h3>
                <p className="text-center text-gray-600 mb-6">
                  即將為選取的學生兌換<br/>
                  <span className="font-bold text-purple-700 text-lg mt-2 inline-block px-3 py-1 bg-purple-50 rounded-lg">{redeemConfirmTarget.name}</span>
                  <br/>
                  <span className="text-sm mt-2 block font-bold text-gray-500">將扣除 <span className="text-red-500">${redeemConfirmTarget.cost}</span></span>
                </p>
                <div className="flex gap-3">
                  <button 
                    onClick={confirmRedeem}
                    className="flex-1 bg-purple-600 text-white py-2.5 rounded-xl font-bold hover:bg-purple-700 transition-colors shadow-sm"
                  >
                    確定兌換
                  </button>
                  <button 
                    onClick={() => setRedeemConfirmTarget(null)}
                    className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl font-bold hover:bg-gray-200 transition-colors"
                  >
                    取消
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 全域 Toast 提示 */}
          {toast && (
            <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-lg font-bold text-sm animate-fadeIn flex items-center gap-2
              ${toast.type === 'error' ? 'bg-red-600 text-white' : 
                toast.type === 'warning' ? 'bg-amber-500 text-white' : 
                toast.type === 'success' ? 'bg-green-500 text-white' : 
                'bg-gray-800 text-white'}`
            }>
              {toast.type === 'error' && <AlertTriangle size={16} />}
              {toast.type === 'warning' && <AlertTriangle size={16} />}
              {toast.type === 'success' && <CheckCircle2 size={16} />}
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    // 啟動 React 應用
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
